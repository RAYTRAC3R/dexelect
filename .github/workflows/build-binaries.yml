name: Build TeamGen Binaries

on:
  push:
    tags:
      - 'v*'

jobs:

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sprites
        run: python main.py --fetch-sprites

      - name: Build
        run: python -m PyInstaller --clean --noconfirm teamgen.spec

      - name: Get version
        id: get_version
        run: echo "VERSION=$(python -c 'import version; print(version.__version__)')" >> $GITHUB_ENV

      - name: Rename output folder
        run: mv dist/teamgen dist/teamgen-v${{ env.VERSION }}-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamgen-v${{ env.VERSION }}-linux-x86_64
          path: dist/teamgen-v${{ env.VERSION }}-linux-x86_64


  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch sprites
        run: python main.py --fetch-sprites

      - name: Build
        run: python -m PyInstaller --clean --noconfirm teamgen.spec

      - name: Get version
        id: get_version
        shell: pwsh
        run: |
          $VERSION = python -c "import version; print(version.__version__)"
          echo "VERSION=$VERSION" >> $env:GITHUB_ENV

      - name: Rename output folder
        shell: pwsh
        run: Rename-Item dist/teamgen "teamgen-v${{ env.VERSION }}-windows-x86_64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: teamgen-v${{ env.VERSION }}-windows-x86_64
          path: dist/teamgen-v${{ env.VERSION }}-windows-x86_64
