allowed_balancing: "Controls the allowed 'lean' values for the generated party. 'balanced' = median acquisition sphere near the game's midpoint. 'early_game_heavy' = biased toward early spheres. 'late_game_heavy' = biased toward late spheres."
allowed_spreads: "Controls how tightly grouped the party's acquisition spheres are. 'clustered' = all members available within a narrow range. 'wide_spread' = members span most or all of the game. 'mixed_spread' = intermediate range."
allowed_patterns: "Controls the qualitative shape of the party across spheres. 'single_cluster' = one contiguous group. 'dual_cluster' = two separate groups. 'early_late_split' = clusters at the start and end. 'middle_only' = all members in the middle portion of the game."
force_starter: "If enabled, one party member will always be a starter Pokémon from the available starter pool."
allow_not_fully_evolved: "If enabled, Pokémon that have a further evolution available may appear in the party."
allow_legendaries: "If enabled, legendary Pokémon may be included in the party."
allow_duplicate_species: "If enabled, the same species may appear more than once in the party."
max_evo_stage: "Maximum evolution stage allowed. 1 = base forms only. 2 = up to first evolution. 3 = fully evolved (no limit)."
bst_max: "Upper base stat total cap. Pokémon with a BST above this value are excluded from the pool. Leave empty for no upper limit."
bst_min: "Lower base stat total floor. Pokémon with a BST below this value are excluded from the pool. Leave empty for no lower limit."
species_blacklist: "Comma-separated list of species names to exclude from the party pool (use internal all-caps names, e.g. RATTATA, PIDGEY)."
allowed_evo_methods: "Which evolution methods are permitted. Pokémon that can only be obtained via an excluded method are removed from the pool."
allow_dual_type: "If enabled, dual-type Pokémon may appear in the party."
type_distribution: "Controls type diversity across the party. 'anything_goes' = no restriction. 'no_overlap' = all 6 members have distinct primary types. 'all_share_one_type' = all members share the prescribed type."
prescribed_type: "The type all party members must share when type_distribution is set to 'all_share_one_type'. Ignored otherwise."
ensure_hm_coverage: "Which HMs must be learnable by at least one party member. Enabling an HM guarantees the party can use it in the field."
allowed_acquisition_methods: "Which in-game acquisition methods are permitted for party members. Pokémon only obtainable via an unchecked method are excluded from the pool."
